name: Test & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=tradingagents --cov-report=term-missing --cov-report=xml --cov-report=html -m "not integration and not performance" --cov-fail-under=3
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENAI_API_KEY: "sk-test-key-placeholder"
          DASHSCOPE_API_KEY: "test-key-placeholder"
          TUSHARE_TOKEN: "test-token-placeholder"

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
