[pytest]
# 只收集 tests/ 目录，避免根目录 test_*.py 被误扫
testpaths = tests

# 默认跳过 integration 标记的测试（可通过 -m integration 运行）
addopts = -m "not integration" -k "not (test_server_config or test_stock_codes)" --ignore=tests/debug_archive --ignore=tests/test_tushare_unified --ignore=tests/unit/dataflows --ignore=tests/unit/test_stocks_kline_news_api.py --ignore=tests/system/test_llm_provider_sanitization.py

# 标记定义，避免警告
markers =
    integration: 标记集成/端到端测试（默认跳过）

